<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Venues - Event Tracker</title>
    <link href="/css/output.css" rel="stylesheet">
    <script src="sidebar.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
    <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
    <style>
        #nearbyMap { height: 400px; border-radius: 0.5rem; }
        #exploreMap { height: 600px; border-radius: 0.5rem; }
        .tab-btn.active { border-color: #334155; color: #1e293b; font-weight: 600; }
        .tab-btn { border-bottom: 2px solid transparent; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .venue-marker { width: 28px; height: 28px; border-radius: 50%; border: 3px solid white; box-shadow: 0 2px 8px rgba(0,0,0,0.3); display: flex; align-items: center; justify-content: center; }
        .venue-marker-default { background-color: #475569; }
        .venue-marker-following { background-color: #16a34a; }
        .venue-marker-icon { width: 12px; height: 12px; fill: white; }

        .venue-popup { min-width: 260px; max-width: 300px; }
        .venue-popup-img { width: 100%; height: 120px; object-fit: cover; border-radius: 0.375rem; }
        .venue-popup-name { font-weight: 700; font-size: 0.95rem; color: #1e293b; margin-top: 0.5rem; }
        .venue-popup-location { font-size: 0.8rem; color: #64748b; }
        .venue-popup-badges { display: flex; gap: 0.375rem; flex-wrap: wrap; margin-top: 0.375rem; }
        .venue-popup-badge { font-size: 0.7rem; padding: 0.125rem 0.5rem; border-radius: 9999px; font-weight: 500; }
        .venue-popup-actions { margin-top: 0.5rem; display: flex; gap: 0.375rem; }

        .marker-cluster-small { background-color: rgba(71, 85, 105, 0.3); }
        .marker-cluster-small div { background-color: rgba(71, 85, 105, 0.7); color: white; }
        .marker-cluster-medium { background-color: rgba(71, 85, 105, 0.4); }
        .marker-cluster-medium div { background-color: rgba(71, 85, 105, 0.8); color: white; }
        .marker-cluster-large { background-color: rgba(71, 85, 105, 0.5); }
        .marker-cluster-large div { background-color: rgba(71, 85, 105, 0.9); color: white; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen">
    <div id="sidebar-container"></div>

    <main id="mainContent" class="main-content lg:ml-64 min-h-screen">
        <div id="header-container"></div>

        <div class="p-4 lg:p-6">
            <!-- Tabs -->
            <div class="border-b border-slate-200 mb-6">
                <nav class="flex gap-6">
                    <button class="tab-btn active pb-3 text-sm text-slate-500 hover:text-slate-700 transition-colors" data-tab="discover">Discover</button>
                    <button class="tab-btn pb-3 text-sm text-slate-500 hover:text-slate-700 transition-colors" data-tab="nearby">Near Me</button>
                    <button class="tab-btn pb-3 text-sm text-slate-500 hover:text-slate-700 transition-colors" data-tab="following">Following</button>
                    <button class="tab-btn pb-3 text-sm text-slate-500 hover:text-slate-700 transition-colors" data-tab="explore">Explore Map</button>
                </nav>
            </div>

            <!-- Tab 1: Discover -->
            <div id="tab-discover" class="tab-content active">
                <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6 mb-6">
                    <div class="flex flex-col md:flex-row gap-4">
                        <input type="text" id="venueSearch" placeholder="Search venues by name..."
                            class="flex-1 px-4 py-2 border border-slate-200 rounded-lg focus:ring-2 focus:ring-slate-400 text-slate-700">
                        <input type="text" id="cityFilter" placeholder="City"
                            class="w-full md:w-40 px-4 py-2 border border-slate-200 rounded-lg focus:ring-2 focus:ring-slate-400 text-slate-700">
                        <select id="stateFilter"
                            class="w-full md:w-40 px-4 py-2 border border-slate-200 rounded-lg focus:ring-2 focus:ring-slate-400 text-slate-700">
                            <option value="">All States</option>
                        </select>
                        <button onclick="searchVenues()" class="px-6 py-2 bg-slate-800 text-white rounded-lg hover:bg-slate-700 transition-colors">Search</button>
                    </div>
                </div>
                <div id="discoverResults" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                    <div class="col-span-full text-center text-slate-400 py-12">Search for venues or browse by location</div>
                </div>
                <div id="discoverPagination" class="flex justify-center gap-2 mt-6 hidden"></div>
            </div>

            <!-- Tab 2: Near Me -->
            <div id="tab-nearby" class="tab-content">
                <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6 mb-6">
                    <div class="flex flex-col md:flex-row items-start md:items-center gap-4">
                        <label class="text-sm font-medium text-slate-600">Radius:</label>
                        <select id="nearbyRadius" onchange="loadNearbyVenues()"
                            class="px-4 py-2 border border-slate-200 rounded-lg focus:ring-2 focus:ring-slate-400 text-slate-700">
                            <option value="10">10 miles</option>
                            <option value="25" selected>25 miles</option>
                            <option value="50">50 miles</option>
                            <option value="100">100 miles</option>
                        </select>
                        <button onclick="requestLocation()" class="px-4 py-2 bg-slate-800 text-white rounded-lg hover:bg-slate-700 transition-colors text-sm">
                            Update My Location
                        </button>
                        <span id="locationStatus" class="text-sm text-slate-400"></span>
                    </div>
                </div>
                <div id="nearbyMap" class="mb-6 bg-slate-200 rounded-xl"></div>
                <div id="nearbyResults" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                    <div class="col-span-full text-center text-slate-400 py-12">Getting your location...</div>
                </div>
            </div>

            <!-- Tab 3: Following -->
            <div id="tab-following" class="tab-content">
                <div id="followingResults" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                    <div class="col-span-full text-center text-slate-400 py-12">Loading followed venues...</div>
                </div>
            </div>

            <!-- Tab 4: Explore Map -->
            <div id="tab-explore" class="tab-content">
                <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-4 mb-4">
                    <div class="flex flex-col md:flex-row items-start md:items-center justify-between gap-3">
                        <div class="flex items-center gap-3">
                            <h3 class="text-sm font-semibold text-slate-700">Explore Venues</h3>
                            <span id="exploreCount" class="text-xs text-slate-400">Pan and zoom to discover venues</span>
                        </div>
                        <div class="flex items-center gap-3">
                            <div class="flex items-center gap-2">
                                <span class="w-3 h-3 rounded-full bg-slate-600 border-2 border-white shadow-sm"></span>
                                <span class="text-xs text-slate-500">Venue</span>
                            </div>
                            <div class="flex items-center gap-2">
                                <span class="w-3 h-3 rounded-full bg-green-600 border-2 border-white shadow-sm"></span>
                                <span class="text-xs text-slate-500">Following</span>
                            </div>
                            <button onclick="centerOnUser()" class="px-3 py-1.5 text-xs border border-slate-200 text-slate-600 rounded-lg hover:bg-slate-50 transition-colors">
                                My Location
                            </button>
                        </div>
                    </div>
                </div>
                <div id="exploreMap" class="mb-4 bg-slate-200 rounded-xl shadow-sm border border-slate-200"></div>
            </div>
        </div>
    </main>

<script>
const API_BASE = '/api/v1';
const token = localStorage.getItem('token');
let nearbyMap = null;
let nearbyMarkers = [];
let userLat = null;
let userLng = null;

// Explore Map state
let exploreMap = null;
let exploreClusterGroup = null;
let exploreMarkerMap = new Map();
let followedVenueIds = new Set();
let exploreFetchController = null;
let exploreDebounceTimer = null;
let exploreInitialized = false;

// US states for filter dropdown
const US_STATES = [
    'AL','AK','AZ','AR','CA','CO','CT','DE','FL','GA','HI','ID','IL','IN','IA','KS','KY',
    'LA','ME','MD','MA','MI','MN','MS','MO','MT','NE','NV','NH','NJ','NM','NY','NC','ND',
    'OH','OK','OR','PA','RI','SC','SD','TN','TX','UT','VT','VA','WA','WV','WI','WY'
];

document.addEventListener('DOMContentLoaded', () => {
    initSidebar('Venues');

    // Load user info
    const user = JSON.parse(localStorage.getItem('user') || '{}');
    if (user.firstName || user.username) updateSidebarUser(user);

    // Populate state dropdown
    const stateSelect = document.getElementById('stateFilter');
    US_STATES.forEach(s => {
        const opt = document.createElement('option');
        opt.value = s;
        opt.textContent = s;
        stateSelect.appendChild(opt);
    });

    // Tab switching
    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => switchTab(btn.dataset.tab));
    });

    // Debounced search
    let searchTimer;
    document.getElementById('venueSearch').addEventListener('input', () => {
        clearTimeout(searchTimer);
        searchTimer = setTimeout(() => searchVenues(), 400);
    });

    // Load initial discover results (all venues)
    searchVenues();

    // Try to get user coordinates for Near Me
    if (user.coordinates?.lat && user.coordinates?.lng) {
        userLat = user.coordinates.lat;
        userLng = user.coordinates.lng;
    }

    // Restore saved tab/map state (e.g., returning from venue profile)
    restoreVenuePageState();
});

function switchTab(tabName) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    document.querySelector(`[data-tab="${tabName}"]`).classList.add('active');
    document.getElementById(`tab-${tabName}`).classList.add('active');

    if (tabName === 'nearby') {
        initNearbyMap();
        // Recalculate map size after tab becomes visible
        setTimeout(() => nearbyMap.invalidateSize(), 100);
        if (userLat && userLng) {
            loadNearbyVenues();
        } else {
            requestLocation();
        }
    }
    if (tabName === 'following') {
        loadFollowedVenues();
    }
    if (tabName === 'explore') {
        initExploreMap();
        setTimeout(() => {
            exploreMap.invalidateSize();
            if (!exploreInitialized) {
                exploreInitialized = true;
                if (userLat && userLng) {
                    exploreMap.setView([userLat, userLng], 10);
                } else {
                    exploreMap.setView([39.8283, -98.5795], 5);
                    if (navigator.geolocation) {
                        navigator.geolocation.getCurrentPosition(
                            (pos) => {
                                userLat = pos.coords.latitude;
                                userLng = pos.coords.longitude;
                                exploreMap.setView([userLat, userLng], 10);
                            },
                            () => {}
                        );
                    }
                }
            }
        }, 100);
        loadFollowedVenueIds();
    }
}

// ===== DISCOVER =====
async function searchVenues(page = 1) {
    const q = document.getElementById('venueSearch').value.trim();
    const city = document.getElementById('cityFilter').value.trim();
    const state = document.getElementById('stateFilter').value;

    const params = new URLSearchParams({ page, limit: 18 });
    if (q) params.set('q', q);
    if (city) params.set('city', city);
    if (state) params.set('state', state);
    if (userLat && userLng) {
        params.set('latitude', userLat);
        params.set('longitude', userLng);
    }

    const container = document.getElementById('discoverResults');
    container.innerHTML = '<div class="col-span-full text-center text-slate-400 py-8">Searching...</div>';

    const headers = {};
    if (token) headers['Authorization'] = `Bearer ${token}`;

    try {
        const res = await fetch(`${API_BASE}/venues?${params}`, { headers });
        const data = await res.json();

        if (data.success && data.venues.length > 0) {
            container.innerHTML = data.venues.map(v => venueCard(v)).join('');
            renderPagination('discoverPagination', data.page, data.totalPages, searchVenues);
        } else {
            container.innerHTML = '<div class="col-span-full text-center text-slate-400 py-12">No venues found</div>';
            document.getElementById('discoverPagination').classList.add('hidden');
        }
    } catch (err) {
        console.error('Search venues error:', err);
        container.innerHTML = '<div class="col-span-full text-center text-red-400 py-8">Failed to load venues</div>';
    }
}

// ===== NEAR ME =====
function initNearbyMap() {
    if (nearbyMap) return;
    nearbyMap = L.map('nearbyMap', { scrollWheelZoom: false }).setView([39.8283, -98.5795], 4);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap contributors'
    }).addTo(nearbyMap);

    // Enable scroll zoom only after user clicks the map
    nearbyMap.on('click', () => nearbyMap.scrollWheelZoom.enable());
    nearbyMap.on('mouseout', () => nearbyMap.scrollWheelZoom.disable());
}

function requestLocation() {
    const status = document.getElementById('locationStatus');
    status.textContent = 'Getting location...';

    if (!navigator.geolocation) {
        status.textContent = 'Geolocation not supported';
        return;
    }

    navigator.geolocation.getCurrentPosition(
        (pos) => {
            userLat = pos.coords.latitude;
            userLng = pos.coords.longitude;
            status.textContent = 'Location updated';
            loadNearbyVenues();
        },
        (err) => {
            console.error('Geolocation error:', err);
            status.textContent = 'Location access denied. Using stored location.';
            // Fall back to stored user coordinates
            const user = JSON.parse(localStorage.getItem('user') || '{}');
            if (user.coordinates?.lat) {
                userLat = user.coordinates.lat;
                userLng = user.coordinates.lng;
                loadNearbyVenues();
            } else {
                document.getElementById('nearbyResults').innerHTML =
                    '<div class="col-span-full text-center text-slate-400 py-12">Unable to get your location. Please update your address in Account Details.</div>';
            }
        }
    );
}

async function loadNearbyVenues() {
    if (!userLat || !userLng) return;

    const radius = document.getElementById('nearbyRadius').value;
    const container = document.getElementById('nearbyResults');
    container.innerHTML = '<div class="col-span-full text-center text-slate-400 py-8">Searching nearby...</div>';

    try {
        const res = await fetch(`${API_BASE}/venues/nearby?longitude=${userLng}&latitude=${userLat}&maxDistance=${radius}`);
        const data = await res.json();

        // Update map
        nearbyMarkers.forEach(m => nearbyMap.removeLayer(m));
        nearbyMarkers = [];
        nearbyMap.setView([userLat, userLng], radius <= 10 ? 9 : radius <= 25 ? 8 : radius <= 50 ? 7 : 6);

        // Add user marker
        const userMarker = L.marker([userLat, userLng], {
            icon: L.divIcon({
                className: 'bg-blue-500 w-3 h-3 rounded-full border-2 border-white shadow-lg',
                iconSize: [12, 12]
            })
        }).addTo(nearbyMap).bindPopup('Your Location');
        nearbyMarkers.push(userMarker);

        if (data.success && data.venues.length > 0) {
            data.venues.forEach(v => {
                if (v.location?.coordinates?.length === 2) {
                    const marker = L.marker([v.location.coordinates[1], v.location.coordinates[0]])
                        .addTo(nearbyMap)
                        .bindPopup(`<b>${v.name}</b><br>${v.city}, ${v.state || ''}<br><a href="venue-profile.html?id=${v._id}" class="text-blue-600">View Profile</a>`);
                    nearbyMarkers.push(marker);
                }
            });

            container.innerHTML = data.venues.map(v => venueCard(v)).join('');
        } else {
            container.innerHTML = '<div class="col-span-full text-center text-slate-400 py-12">No venues found within this radius</div>';
        }
    } catch (err) {
        console.error('Nearby venues error:', err);
        container.innerHTML = '<div class="col-span-full text-center text-red-400 py-8">Failed to load nearby venues</div>';
    }
}

// ===== FOLLOWING =====
async function loadFollowedVenues() {
    const container = document.getElementById('followingResults');

    if (!token) {
        container.innerHTML = '<div class="col-span-full text-center text-slate-400 py-12">Please log in to see followed venues</div>';
        return;
    }

    container.innerHTML = '<div class="col-span-full text-center text-slate-400 py-8">Loading...</div>';

    try {
        const res = await fetch(`${API_BASE}/venues/following`, {
            headers: { 'Authorization': `Bearer ${token}` }
        });
        const data = await res.json();

        if (data.success && data.venues.length > 0) {
            container.innerHTML = data.venues.map(v => venueCard(v, true)).join('');
        } else {
            container.innerHTML = '<div class="col-span-full text-center text-slate-400 py-12">You\'re not following any venues yet. Discover venues and follow them to see updates here.</div>';
        }
    } catch (err) {
        console.error('Followed venues error:', err);
        container.innerHTML = '<div class="col-span-full text-center text-red-400 py-8">Failed to load followed venues</div>';
    }
}

// ===== SHARED =====
function venueCard(venue, showUnfollow = false) {
    const location = [venue.city, venue.state].filter(Boolean).join(', ');
    const capacity = venue.capacity ? `Capacity: ${venue.capacity.toLocaleString()}` : '';
    const upcoming = venue.upcomingEventCount !== undefined ? `${venue.upcomingEventCount} upcoming` : (venue.stats?.upcomingEvents ? `${venue.stats.upcomingEvents} upcoming` : '');
    const followers = venue.stats?.followers ? `${venue.stats.followers} follower${venue.stats.followers !== 1 ? 's' : ''}` : '';

    return `
        <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-5 hover:shadow-md transition-shadow">
            <h3 class="font-bold text-slate-800 text-lg mb-1 truncate">${venue.name}</h3>
            <p class="text-slate-500 text-sm mb-3">${location}</p>
            <div class="flex flex-wrap gap-2 mb-4 text-xs">
                ${capacity ? `<span class="bg-slate-100 text-slate-600 px-2 py-1 rounded-full">${capacity}</span>` : ''}
                ${upcoming ? `<span class="bg-blue-50 text-blue-600 px-2 py-1 rounded-full">${upcoming}</span>` : ''}
                ${followers ? `<span class="bg-slate-50 text-slate-500 px-2 py-1 rounded-full">${followers}</span>` : ''}
            </div>
            <div class="flex gap-2">
                <a href="venue-profile.html?id=${venue._id}" class="flex-1 text-center px-4 py-2 bg-slate-800 text-white text-sm rounded-lg hover:bg-slate-700 transition-colors">View Profile</a>
                ${showUnfollow
                    ? `<button onclick="unfollowVenue('${venue._id}', this)" class="px-4 py-2 border border-red-200 text-red-500 text-sm rounded-lg hover:bg-red-50 transition-colors">Unfollow</button>`
                    : `<button onclick="toggleFollow('${venue._id}', this)" class="px-4 py-2 border border-slate-200 text-slate-600 text-sm rounded-lg hover:bg-slate-50 transition-colors follow-btn">Follow</button>`
                }
            </div>
        </div>
    `;
}

async function toggleFollow(venueId, btn) {
    if (!token) {
        alert('Please log in to follow venues');
        return;
    }
    try {
        const res = await fetch(`${API_BASE}/venues/${venueId}/follow`, {
            method: 'POST',
            headers: { 'Authorization': `Bearer ${token}` }
        });
        const data = await res.json();
        if (data.success) {
            btn.textContent = 'Following';
            btn.classList.remove('border-slate-200', 'text-slate-600');
            btn.classList.add('border-green-200', 'text-green-600', 'bg-green-50');
            btn.disabled = true;
        } else {
            alert(data.message || 'Could not follow venue');
        }
    } catch (err) {
        console.error('Follow error:', err);
    }
}

async function unfollowVenue(venueId, btn) {
    if (!token) return;
    try {
        const res = await fetch(`${API_BASE}/venues/${venueId}/follow`, {
            method: 'DELETE',
            headers: { 'Authorization': `Bearer ${token}` }
        });
        const data = await res.json();
        if (data.success) {
            btn.closest('.bg-white').remove();
            // Check if list is now empty
            const container = document.getElementById('followingResults');
            if (!container.querySelector('.bg-white')) {
                container.innerHTML = '<div class="col-span-full text-center text-slate-400 py-12">You\'re not following any venues yet.</div>';
            }
        }
    } catch (err) {
        console.error('Unfollow error:', err);
    }
}

function renderPagination(containerId, currentPage, totalPages, callback) {
    const container = document.getElementById(containerId);
    if (totalPages <= 1) {
        container.classList.add('hidden');
        return;
    }
    container.classList.remove('hidden');
    let html = '';
    if (currentPage > 1) {
        html += `<button onclick="window._paginate(${currentPage - 1})" class="px-3 py-1 rounded border border-slate-200 text-slate-600 hover:bg-slate-50 text-sm">Prev</button>`;
    }
    for (let i = Math.max(1, currentPage - 2); i <= Math.min(totalPages, currentPage + 2); i++) {
        const active = i === currentPage ? 'bg-slate-800 text-white' : 'border border-slate-200 text-slate-600 hover:bg-slate-50';
        html += `<button onclick="window._paginate(${i})" class="px-3 py-1 rounded ${active} text-sm">${i}</button>`;
    }
    if (currentPage < totalPages) {
        html += `<button onclick="window._paginate(${currentPage + 1})" class="px-3 py-1 rounded border border-slate-200 text-slate-600 hover:bg-slate-50 text-sm">Next</button>`;
    }
    container.innerHTML = html;
    window._paginate = callback;
}

// ===== EXPLORE MAP =====
function initExploreMap() {
    if (exploreMap) return;

    exploreMap = L.map('exploreMap', { scrollWheelZoom: false }).setView([39.8283, -98.5795], 5);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap contributors'
    }).addTo(exploreMap);

    exploreMap.on('click', () => exploreMap.scrollWheelZoom.enable());
    exploreMap.on('mouseout', () => exploreMap.scrollWheelZoom.disable());

    exploreClusterGroup = L.markerClusterGroup({
        maxClusterRadius: 50,
        spiderfyOnMaxZoom: true,
        showCoverageOnHover: false,
        zoomToBoundsOnClick: true,
        disableClusteringAtZoom: 14,
        iconCreateFunction: function(cluster) {
            const count = cluster.getChildCount();
            let size = 'small';
            if (count >= 50) size = 'large';
            else if (count >= 10) size = 'medium';
            return L.divIcon({
                html: `<div><span>${count}</span></div>`,
                className: `marker-cluster marker-cluster-${size}`,
                iconSize: L.point(40, 40)
            });
        }
    });
    exploreMap.addLayer(exploreClusterGroup);

    exploreMap.on('moveend', onExploreMapMoved);
}

function onExploreMapMoved() {
    clearTimeout(exploreDebounceTimer);
    exploreDebounceTimer = setTimeout(() => {
        loadExploreVenues();
    }, 400);
}

async function loadExploreVenues() {
    if (exploreFetchController) {
        exploreFetchController.abort();
    }
    exploreFetchController = new AbortController();

    const center = exploreMap.getCenter();
    const bounds = exploreMap.getBounds();

    const ne = bounds.getNorthEast();
    const radiusMiles = center.distanceTo(ne) / 1609.34;
    const cappedRadius = Math.min(radiusMiles, 500);

    if (exploreMap.getZoom() < 5) {
        document.getElementById('exploreCount').textContent = 'Zoom in to discover venues';
        return;
    }

    document.getElementById('exploreCount').textContent = 'Loading venues...';

    try {
        const res = await fetch(
            `${API_BASE}/venues/map-markers?longitude=${center.lng}&latitude=${center.lat}&maxDistance=${Math.ceil(cappedRadius)}&limit=200`,
            { signal: exploreFetchController.signal }
        );
        const data = await res.json();

        if (data.success) {
            updateExploreMarkers(data.venues);
            document.getElementById('exploreCount').textContent =
                `${data.count} venue${data.count !== 1 ? 's' : ''} in this area`;
        }
    } catch (err) {
        if (err.name === 'AbortError') return;
        console.error('Explore venues error:', err);
        document.getElementById('exploreCount').textContent = 'Error loading venues';
    }
}

function updateExploreMarkers(venues) {
    const incomingIds = new Set();

    venues.forEach(venue => {
        if (!venue.location?.coordinates || venue.location.coordinates.length !== 2) return;

        const venueId = venue._id;
        incomingIds.add(venueId);

        if (exploreMarkerMap.has(venueId)) return;

        const [lng, lat] = venue.location.coordinates;
        const isFollowing = followedVenueIds.has(venueId);

        const markerIcon = L.divIcon({
            className: `venue-marker ${isFollowing ? 'venue-marker-following' : 'venue-marker-default'}`,
            html: '<svg class="venue-marker-icon" viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/></svg>',
            iconSize: [28, 28],
            iconAnchor: [14, 28],
            popupAnchor: [0, -28]
        });

        const marker = L.marker([lat, lng], { icon: markerIcon });

        marker.bindPopup(() => buildVenuePopup(venue, followedVenueIds.has(venueId)), {
            maxWidth: 300,
            className: 'venue-popup-wrapper'
        });

        exploreClusterGroup.addLayer(marker);
        exploreMarkerMap.set(venueId, marker);
    });

    const bufferedBounds = exploreMap.getBounds().pad(0.5);
    for (const [venueId, marker] of exploreMarkerMap) {
        if (!incomingIds.has(venueId) && !bufferedBounds.contains(marker.getLatLng())) {
            exploreClusterGroup.removeLayer(marker);
            exploreMarkerMap.delete(venueId);
        }
    }
}

function buildVenuePopup(venue, isFollowing) {
    const location = [venue.city, venue.state].filter(Boolean).join(', ');
    const capacity = venue.capacity ? `Capacity: ${venue.capacity.toLocaleString()}` : '';
    const upcoming = venue.stats?.upcomingEvents ? `${venue.stats.upcomingEvents} upcoming` : '';
    const imgSrc = venue.images?.hero || venue.images?.thumbnail || '';

    return `
        <div class="venue-popup">
            ${imgSrc ? `<img src="${imgSrc}" alt="${venue.name}" class="venue-popup-img" onerror="this.style.display='none'">` : ''}
            <div class="venue-popup-name">${venue.name}</div>
            <div class="venue-popup-location">${location}</div>
            <div class="venue-popup-badges">
                ${capacity ? `<span class="venue-popup-badge bg-slate-100 text-slate-600">${capacity}</span>` : ''}
                ${upcoming ? `<span class="venue-popup-badge bg-blue-50 text-blue-600">${upcoming}</span>` : ''}
            </div>
            <div class="venue-popup-actions">
                <a href="venue-profile.html?id=${venue._id}"
                   class="flex-1 text-center px-3 py-1.5 bg-slate-800 text-white text-xs rounded-lg no-underline hover:bg-slate-700">
                    View Profile
                </a>
                ${token ? `
                    <button onclick="toggleExploreFollow('${venue._id}', this)"
                        class="px-3 py-1.5 text-xs rounded-lg border ${isFollowing ? 'border-green-200 bg-green-50 text-green-600' : 'border-slate-200 bg-white text-slate-600'}">
                        ${isFollowing ? 'Following' : 'Follow'}
                    </button>
                ` : ''}
            </div>
        </div>
    `;
}

async function toggleExploreFollow(venueId, btn) {
    if (!token) {
        alert('Please log in to follow venues');
        return;
    }

    const isCurrentlyFollowing = followedVenueIds.has(venueId);
    const method = isCurrentlyFollowing ? 'DELETE' : 'POST';

    try {
        const res = await fetch(`${API_BASE}/venues/${venueId}/follow`, {
            method,
            headers: { 'Authorization': `Bearer ${token}` }
        });
        const data = await res.json();

        if (data.success) {
            if (isCurrentlyFollowing) {
                followedVenueIds.delete(venueId);
                btn.textContent = 'Follow';
                btn.className = 'px-3 py-1.5 text-xs rounded-lg border border-slate-200 bg-white text-slate-600';
            } else {
                followedVenueIds.add(venueId);
                btn.textContent = 'Following';
                btn.className = 'px-3 py-1.5 text-xs rounded-lg border border-green-200 bg-green-50 text-green-600';
            }
            updateMarkerFollowState(venueId, !isCurrentlyFollowing);
        } else {
            alert(data.message || 'Could not update follow status');
        }
    } catch (err) {
        console.error('Explore follow error:', err);
    }
}

function updateMarkerFollowState(venueId, isNowFollowing) {
    const marker = exploreMarkerMap.get(venueId);
    if (!marker) return;

    const newIcon = L.divIcon({
        className: `venue-marker ${isNowFollowing ? 'venue-marker-following' : 'venue-marker-default'}`,
        html: '<svg class="venue-marker-icon" viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/></svg>',
        iconSize: [28, 28],
        iconAnchor: [14, 28],
        popupAnchor: [0, -28]
    });
    marker.setIcon(newIcon);
}

async function loadFollowedVenueIds() {
    if (!token) return;

    try {
        const res = await fetch(`${API_BASE}/venues/following`, {
            headers: { 'Authorization': `Bearer ${token}` }
        });
        const data = await res.json();

        if (data.success && data.venues) {
            followedVenueIds = new Set(data.venues.map(v => v._id));

            for (const [venueId] of exploreMarkerMap) {
                if (followedVenueIds.has(venueId)) {
                    updateMarkerFollowState(venueId, true);
                }
            }
        }
    } catch (err) {
        console.error('Error loading followed venues:', err);
    }
}

function centerOnUser() {
    if (!exploreMap) return;

    if (userLat && userLng) {
        exploreMap.setView([userLat, userLng], 10);
    } else if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
            (pos) => {
                userLat = pos.coords.latitude;
                userLng = pos.coords.longitude;
                exploreMap.setView([userLat, userLng], 10);
            },
            () => alert('Unable to get your location')
        );
    } else {
        alert('Geolocation is not supported by your browser');
    }
}

// ===== STATE PERSISTENCE (survive navigation to venue profile and back) =====
function saveVenuePageState() {
    const activeTab = document.querySelector('.tab-btn.active')?.dataset.tab || 'discover';
    const state = { tab: activeTab };

    if (activeTab === 'explore' && exploreMap) {
        const center = exploreMap.getCenter();
        state.exploreLat = center.lat;
        state.exploreLng = center.lng;
        state.exploreZoom = exploreMap.getZoom();
    }
    if (activeTab === 'nearby' && nearbyMap) {
        const center = nearbyMap.getCenter();
        state.nearbyLat = center.lat;
        state.nearbyLng = center.lng;
        state.nearbyZoom = nearbyMap.getZoom();
    }

    sessionStorage.setItem('venuesPageState', JSON.stringify(state));
}

function restoreVenuePageState() {
    const raw = sessionStorage.getItem('venuesPageState');
    if (!raw) return;

    // Only restore if we came from venue-profile (back navigation)
    if (!document.referrer.includes('venue-profile.html')) {
        sessionStorage.removeItem('venuesPageState');
        return;
    }

    const state = JSON.parse(raw);
    sessionStorage.removeItem('venuesPageState');

    if (state.tab && state.tab !== 'discover') {
        // Switch to saved tab
        switchTab(state.tab);

        if (state.tab === 'explore' && state.exploreLat != null) {
            // Override the default init — set saved position after map is ready
            setTimeout(() => {
                if (exploreMap) {
                    exploreInitialized = true;
                    exploreMap.setView([state.exploreLat, state.exploreLng], state.exploreZoom);
                }
            }, 200);
        }
        if (state.tab === 'nearby' && state.nearbyLat != null) {
            setTimeout(() => {
                if (nearbyMap) {
                    nearbyMap.setView([state.nearbyLat, state.nearbyLng], state.nearbyZoom);
                }
            }, 200);
        }
    }
}

// Save state before navigating away — intercept all venue profile links
document.addEventListener('click', (e) => {
    const link = e.target.closest('a[href*="venue-profile.html"]');
    if (link) saveVenuePageState();
});
</script>
